# frontend/pubspec.yaml
name: sevakai_frontend
description: SevakAI Flutter client for offline-first disaster response.
publish_to: 'none'

version: 0.1.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  connectivity_plus: ^5.0.2
  dio: ^5.4.0
  fpdart: ^1.1.0
  flutter_bloc: ^8.1.4
  flutter_secure_storage: ^9.0.0
  geolocator: ^11.1.0
  get_it: ^7.6.7
  go_router: ^13.2.0
  google_fonts: ^6.1.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  freezed_annotation: ^2.4.1
  injectable: ^2.3.2
  json_annotation: ^4.9.0
  shared_preferences: ^2.2.3
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.8
  flutter_lints: ^4.0.0
  freezed: ^2.4.7
  hive_generator: ^2.0.1
  injectable_generator: ^2.4.1
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/translations/
